name: build-and-push

# Builds the from-scratch WireGuard tools image and publishes to GHCR with
# the built-in GITHUB_TOKEN. Weekly rebuild keeps the Debian base patched.
on:
  push:
    branches: [main]
    paths: [Dockerfile, entrypoint.sh, .github/workflows/build.yml]
  workflow_dispatch:
  schedule:
    - cron: '0 6 * * 1'

permissions:
  contents: read
  packages: write

env:
  IMAGE: ghcr.io/gamectl-hq/wireguard-kube

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: docker/setup-buildx-action@v3
      - uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - uses: docker/build-push-action@v6
        with:
          context: .
          push: true
          tags: ${{ env.IMAGE }}:latest
          labels: |
            org.opencontainers.image.source=https://github.com/GameCTL-HQ/WireGuard-Kube
            org.opencontainers.image.description=From-scratch WireGuard tools image for GameCTL/ProxyCTL tunnel pods (Debian official base, host-kernel data plane)
